connector.name=iceberg
iceberg.catalog.type=jdbc

# Подключение к Postgres
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://iceberg-db:5432/catalog_db
iceberg.jdbc-catalog.connection-user=catalog_user
iceberg.jdbc-catalog.connection-password=catalog_password
iceberg.jdbc-catalog.catalog-name=web_analytics_catalog

# === ВОТ ЭТА СТРОЧКА ИСПРАВЛЯЕТ ПЕРВУЮ ОШИБКУ ===
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver

# Настройки MinIO
iceberg.file-format=PARQUET
iceberg.jdbc-catalog.default-warehouse-dir=s3a://lakehouse/
hive.s3.aws-access-key=admin
hive.s3.aws-secret-key=password
hive.s3.endpoint=http://minio:9000
hive.s3.path-style-access=true